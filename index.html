<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Narrative Canvas</title>
    <link rel="stylesheet" href="./canvas.css?v=20260602-0055">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar sidebar-left">
        <header class="pane-header">
          <div>
            <span class="pane-kicker">Vault</span>
            <h1>Narrative Canvas</h1>
          </div>
          <button class="icon-button" title="New project" data-action="new-project">+</button>
        </header>

        <section class="nav-section">
          <h2>Files</h2>
          <button class="tree-item active" data-file-id="adventure">
            <span class="file-dot"></span>
            The Adventure.canvas
          </button>
          <button class="tree-item" data-file-id="characters">
            <span class="file-dot muted"></span>
            Characters.md
          </button>
          <button class="tree-item" data-file-id="events">
            <span class="file-dot muted"></span>
            Events Sheet.csv
          </button>
          <button class="tree-item" data-file-id="variables">
            <span class="file-dot muted"></span>
            Variables.json
          </button>
        </section>

        <section class="nav-section palette">
          <h2>Node Library</h2>
          <div id="nodePalette" class="palette-list"></div>
        </section>

        <section class="nav-section">
          <h2>Quick Notes</h2>
          <textarea id="projectNotes" spellcheck="false" placeholder="Project notes"></textarea>
        </section>
      </aside>

      <main class="workspace">
        <header class="workspace-tabs">
          <div class="tab-group">
            <div id="activeFileTab" class="tab active">The Adventure.canvas</div>
            <button class="tab preview-tab" data-action="play" type="button">Runtime Preview</button>
          </div>
          <div class="toolbar-group">
            <button class="toolbar-button" data-action="zoom-out" data-files="adventure" title="Zoom out">-</button>
            <span id="zoomReadout" class="zoom-readout" data-files="adventure">100%</span>
            <button class="toolbar-button" data-action="zoom-in" data-files="adventure" title="Zoom in">+</button>
            <button class="toolbar-button" data-action="center-view" data-files="adventure" title="Center canvas">Center</button>
            <button class="toolbar-button primary" data-action="play" data-files="adventure" title="Play from entry">Play</button>
            <button class="toolbar-button" data-action="export-json" data-files="adventure" title="Export full project JSON">Export JSON</button>
            <button class="toolbar-button" data-action="export-characters-md" data-files="characters" title="Export characters as Markdown">Export MD</button>
            <button class="toolbar-button" data-action="export-event-sheet" data-files="events" title="Export Events Sheet as CSV">Export CSV</button>
            <button class="toolbar-button" data-action="export-variables-json" data-files="variables" title="Export variables as JSON">Export JSON</button>
            <button class="toolbar-button" data-action="export-image" data-files="adventure" title="Export canvas as PNG">Image</button>
            <button class="toolbar-button" data-action="export-html" data-files="adventure" title="Export printable HTML">HTML</button>
            <button class="toolbar-button" data-action="import-json" data-files="adventure" title="Import project JSON">Import</button>
          </div>
          <input id="fileInput" type="file" accept="application/json,.json" hidden>
        </header>

        <section id="canvasPanel" class="workspace-view canvas-panel active">
          <div class="canvas-frame">
            <div id="canvasViewport" class="canvas-viewport" tabindex="0" aria-label="Node canvas">
              <div id="canvasContent" class="canvas-content">
                <svg id="linkLayer" class="link-layer" xmlns="http://www.w3.org/2000/svg"></svg>
                <div id="nodeLayer" class="node-layer"></div>
              </div>
            </div>
            <div id="selectionHint" class="selection-hint">Click an output port, then an input port to connect nodes.</div>
            <div id="minimap" class="minimap" aria-hidden="true"></div>
          </div>
        </section>
        <section id="charactersPanel" class="workspace-view document-panel" aria-label="Characters"></section>
        <section id="variablesPanel" class="workspace-view document-panel" aria-label="Variables"></section>
        <section id="eventsPanel" class="workspace-view document-panel event-sheet-panel" aria-label="Events Sheet"></section>

        <footer class="status-bar">
          <div id="statusText">Ready</div>
          <label class="search-box">
            Query
            <input id="queryInput" type="search" placeholder="Find nodes">
          </label>
          <div id="matchCount">0 matches</div>
          <button class="status-button" data-action="play">Inspect</button>
        </footer>
      </main>

      <aside class="sidebar sidebar-right">
        <header class="pane-header compact">
          <div>
            <span class="pane-kicker">Inspector</span>
            <h1 id="inspectorTitle">Project</h1>
          </div>
        </header>

        <div class="inspector-tabs">
          <button class="inspector-tab active" data-panel="project">Project</button>
          <button class="inspector-tab" data-panel="node">Node</button>
          <button class="inspector-tab" data-panel="story">Story</button>
        </div>

        <section id="projectPanel" class="inspector-panel active"></section>
        <section id="nodePanel" class="inspector-panel"></section>
        <section id="storyPanel" class="inspector-panel"></section>
      </aside>
    </div>

    <div id="nodeContextMenu" class="node-context-menu" hidden>
      <button data-layer-action="front">Bring to front</button>
      <button data-layer-action="forward">Bring forward</button>
      <button data-layer-action="backward">Send backward</button>
      <button data-layer-action="back">Send to back</button>
    </div>

    <dialog id="playDialog" class="play-dialog">
      <form method="dialog" class="play-shell">
        <header class="play-header">
          <div>
            <span class="pane-kicker">Runtime</span>
            <h2 id="playTitle">Preview</h2>
          </div>
          <button class="icon-button" value="close" aria-label="Close preview">x</button>
        </header>
        <article id="playBody" class="play-body"></article>
        <footer id="playActions" class="play-actions"></footer>
      </form>
    </dialog>

    <dialog id="confirmDialog" class="confirm-dialog">
      <form method="dialog" class="confirm-shell">
        <header>
          <span class="pane-kicker">New Canvas</span>
          <h2>Discard the current canvas and create a blank one?</h2>
        </header>
        <footer class="confirm-actions">
          <button class="small-button confirm-muted" value="confirm">Create</button>
          <button class="small-button confirm-cancel" value="cancel" autofocus>Cancel</button>
        </footer>
      </form>
    </dialog>

    <script src="./app.js?v=20260602-0055"></script>
  </body>
</html>
