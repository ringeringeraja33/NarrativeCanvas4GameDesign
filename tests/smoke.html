<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Narrative Canvas Smoke Test</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
      }

      iframe {
        width: 1180px;
        height: 760px;
        border: 1px solid #555;
      }

      #smoke-report {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body data-smoke-status="running">
    <h1>Narrative Canvas Smoke Test</h1>
    <pre id="smoke-report">running</pre>
    <script>
      const report = {
        startedAt: new Date().toISOString(),
        tests: [],
        failures: []
      };

      function record(name, status, detail = "") {
        report.tests.push({ name, status, detail });
      }

      function pass(name, detail = "") {
        record(name, "pass", detail);
      }

      function fail(name, detail = "") {
        record(name, "fail", detail);
        report.failures.push({ name, detail });
      }

      function assert(name, condition, detail = "") {
        if (condition) pass(name, detail);
        else fail(name, detail);
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function waitFor(name, predicate, timeout = 4000) {
        const started = performance.now();
        while (performance.now() - started < timeout) {
          if (predicate()) {
            pass(name);
            return true;
          }
          await wait(50);
        }
        fail(name, "Timed out");
        return false;
      }

      function setControlValue(win, element, value) {
        element.focus();
        element.value = value;
        element.dispatchEvent(new win.Event("input", { bubbles: true }));
        element.dispatchEvent(new win.Event("change", { bubbles: true }));
      }

      function click(element) {
        element.dispatchEvent(new MouseEvent("click", { bubbles: true, cancelable: true, view: element.ownerDocument.defaultView }));
      }

      function getPortHitInfo(doc, port) {
        if (!port) return null;
        const viewport = doc.querySelector("#canvasViewport");
        const viewportRect = viewport?.getBoundingClientRect();
        const rect = port.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const hit = doc.elementFromPoint(cx, cy);
        return {
          port,
          rect,
          hit,
          inViewport: Boolean(viewportRect
            && cx >= viewportRect.left
            && cx <= viewportRect.right
            && cy >= viewportRect.top
            && cy <= viewportRect.bottom),
          isHitTarget: hit?.closest("[data-port]") === port
        };
      }

      function findClickablePort(doc, kind, excludeNodeId = "") {
        return [...doc.querySelectorAll(`.port.${kind}[data-node-id]`)]
          .map((port) => getPortHitInfo(doc, port))
          .find((info) => info
            && info.inViewport
            && info.isHitTarget
            && (!excludeNodeId || info.port.dataset.nodeId !== excludeNodeId));
      }

      function isElementHidden(win, element) {
        if (!element) return true;
        const style = win.getComputedStyle(element);
        return Boolean(element.closest("[hidden]")) || element.hidden || style.display === "none" || style.visibility === "hidden";
      }

      function isTransparentColor(value) {
        return value === "transparent" || value === "rgba(0, 0, 0, 0)";
      }

      function hasHiddenBorder(style, side) {
        const prefix = `border${side}`;
        return style[`${prefix}Width`] === "0px" || isTransparentColor(style[`${prefix}Color`]);
      }

      function hasCollapsedToggleRule(doc) {
        try {
          return [...doc.styleSheets].some((sheet) => [...sheet.cssRules]
            .some((rule) => String(rule.cssText || "").includes("sidebar-toggle-button[aria-expanded=\"false\"]")));
        } catch (error) {
          return false;
        }
      }

      function verticalCentersAligned(first, second, tolerance = 2) {
        const firstRect = first.getBoundingClientRect();
        const secondRect = second.getBoundingClientRect();
        const firstCenter = firstRect.top + firstRect.height / 2;
        const secondCenter = secondRect.top + secondRect.height / 2;
        return Math.abs(firstCenter - secondCenter) <= tolerance;
      }

      function verticalCenterDetail(first, second) {
        const firstRect = first.getBoundingClientRect();
        const secondRect = second.getBoundingClientRect();
        return `left=${(firstRect.top + firstRect.height / 2).toFixed(1)} right=${(secondRect.top + secondRect.height / 2).toFixed(1)}`;
      }

      function parseRgb(value) {
        const match = String(value || "").match(/rgba?\(([^)]+)\)/i);
        if (!match) return null;
        const parts = match[1].split(/,\s*/).map((part) => Number.parseFloat(part));
        if (parts.length < 3 || parts.some((part) => Number.isNaN(part))) return null;
        return parts.slice(0, 3);
      }

      function relativeLuminance(rgb) {
        return rgb
          .map((channel) => {
            const value = channel / 255;
            return value <= 0.03928 ? value / 12.92 : Math.pow((value + 0.055) / 1.055, 2.4);
          })
          .reduce((sum, value, index) => sum + value * [0.2126, 0.7152, 0.0722][index], 0);
      }

      function contrastRatio(colorA, colorB) {
        const rgbA = parseRgb(colorA);
        const rgbB = parseRgb(colorB);
        if (!rgbA || !rgbB) return 0;
        const light = Math.max(relativeLuminance(rgbA), relativeLuminance(rgbB));
        const dark = Math.min(relativeLuminance(rgbA), relativeLuminance(rgbB));
        return (light + 0.05) / (dark + 0.05);
      }

      function assertReadableLightThemeToggle(label, win, button, stateName) {
        const style = win.getComputedStyle(button);
        const contrast = contrastRatio(style.color, style.backgroundColor);
        const background = parseRgb(style.backgroundColor) || [0, 0, 0];
        const isLightBackground = Math.min(...background) >= 220;
        assert(
          `${label}: theme toggle ${stateName} state is readable on light background`,
          contrast >= 4.5 && isLightBackground,
          `contrast=${contrast.toFixed(2)} color=${style.color} bg=${style.backgroundColor}`
        );
      }

      function readSavedProject(win) {
        const latestPluginSave = win.__saveProjectCalls?.[win.__saveProjectCalls.length - 1] || "";
        const raw = latestPluginSave || win.localStorage?.getItem("narrative-canvas-state-v1") || "";
        return raw ? JSON.parse(raw) : null;
      }

      async function verifyCanDeleteAllCharactersAndVariables(label, win, doc) {
        click(doc.querySelector("[data-file-id='characters']"));
        await waitFor(`${label}: characters page opens for delete-all check`, () => Boolean(doc.querySelector("#charactersPanel")));
        const characterSearch = doc.querySelector("[data-character-search]");
        if (characterSearch?.value) {
          setControlValue(win, characterSearch, "");
          await wait(80);
        }
        click(doc.querySelector("[data-action='add-character']"));
        await waitFor(`${label}: character can be added before delete-all check`, () => Boolean(doc.querySelector("#charactersPanel [data-action='delete-character']")));
        const deleteCharacterButton = doc.querySelector("#charactersPanel [data-action='delete-character']");
        if (deleteCharacterButton) click(deleteCharacterButton);
        await waitFor(`${label}: last character can be deleted`, () => doc.querySelector("#charactersPanel")?.textContent.includes("No characters yet."));
        await win.NarrativeCanvasApp.save({ silent: true });
        const savedWithoutCharacters = readSavedProject(win);
        assert(
          `${label}: deleting last character saves empty character list`,
          Array.isArray(savedWithoutCharacters?.project?.characters) && savedWithoutCharacters.project.characters.length === 0
        );

        click(doc.querySelector("[data-file-id='variables']"));
        await waitFor(`${label}: playbook opens for delete-all check`, () => Boolean(doc.querySelector("#variablesPanel")));
        if (!doc.querySelector("#variablesPanel [data-action='delete-variable']")) {
          click(doc.querySelector("#variablesPanel [data-action='add-variable']"));
          await waitFor(`${label}: variable can be added before delete-all check`, () => Boolean(doc.querySelector("#variablesPanel [data-action='delete-variable']")));
        }
        for (let guard = 0; guard < 12; guard += 1) {
          const deleteButton = doc.querySelector("#variablesPanel [data-action='delete-variable']");
          if (!deleteButton) break;
          click(deleteButton);
          await wait(80);
        }
        await waitFor(`${label}: last variable can be deleted`, () => !doc.querySelector("#variablesPanel [data-action='delete-variable']") && doc.querySelector("#variablesPanel")?.textContent.includes("No variables yet."));
        await win.NarrativeCanvasApp.save({ silent: true });
        const savedWithoutVariables = readSavedProject(win);
        assert(
          `${label}: deleting last variable saves empty variables object`,
          savedWithoutVariables?.project?.variables
            && !Array.isArray(savedWithoutVariables.project.variables)
            && Object.keys(savedWithoutVariables.project.variables).length === 0
        );
        click(doc.querySelector("#variablesPanel [data-action='add-variable']"));
        await waitFor(`${label}: add variable still works after deleting all variables`, () => Boolean(doc.querySelector("#variablesPanel [data-action='delete-variable']")));
        for (let guard = 0; guard < 4; guard += 1) {
          const deleteButton = doc.querySelector("#variablesPanel [data-action='delete-variable']");
          if (!deleteButton) break;
          click(deleteButton);
          await wait(80);
        }
        await waitFor(`${label}: variable can be deleted again after re-adding`, () => !doc.querySelector("#variablesPanel [data-action='delete-variable']") && doc.querySelector("#variablesPanel")?.textContent.includes("No variables yet."));
      }

      function extractBodyHtml(html) {
        const match = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        const bodyHtml = match ? match[1] : html;
        return bodyHtml
          .replace(/<script\b[\s\S]*?<\/script>/gi, "")
          .replace(/<link\b[^>]*rel=["']stylesheet["'][^>]*>/gi, "");
      }

      const projectBaseUrl = new URL("../", window.location.href);

      function assetUrl(path) {
        return new URL(path, projectBaseUrl).href;
      }

      function scopeCanvasCss(source) {
        const keyframes = [];
        let css = source
          .replace(/:root/g, ".narrative-canvas-plugin-host")
          .replace(/(^|})\s*html\s*,\s*body\s*{/g, "$1\n.narrative-canvas-plugin-host {")
          .replace(/(^|})\s*body\s*{/g, "$1\n.narrative-canvas-plugin-host {");

        css = css.replace(/@keyframes\s+[-_a-zA-Z0-9]+\s*{(?:[^{}]|{[^{}]*})*}/g, (match) => {
          const token = `__NARRATIVE_CANVAS_KEYFRAMES_${keyframes.length}__`;
          keyframes.push(match);
          return token;
        });

        css = css.replace(/(^|[{}])\s*([^@{}][^{]+)\s*{/g, (match, boundary, selectorText) => {
          const selectors = selectorText
            .split(",")
            .map((selector) => selector.trim())
            .filter(Boolean)
            .map((selector) => selector.startsWith(".narrative-canvas-plugin-host")
              ? selector
              : `.narrative-canvas-plugin-host ${selector}`);

          return `${boundary}\n${selectors.join(", ")} {`;
        });

        return css.replace(/__NARRATIVE_CANVAS_KEYFRAMES_(\d+)__/g, (_match, index) => keyframes[Number(index)] || "");
      }

      async function loadWebFrame() {
        const frame = document.createElement("iframe");
        frame.title = "web smoke target";
        frame.src = `${assetUrl("index.html")}?smoke=${Date.now()}`;
        document.body.append(frame);
        await new Promise((resolve, reject) => {
          frame.addEventListener("load", resolve, { once: true });
          frame.addEventListener("error", reject, { once: true });
        });
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        await waitFor("web app ready", () => Boolean(win.NarrativeCanvasApp && doc.querySelector(".app-shell[data-theme]")));
        return { frame, win, doc };
      }

      async function loadPluginFrame() {
        const [html, css, appJs] = await Promise.all([
          fetch(assetUrl("index.html")).then((response) => response.text()),
          fetch(assetUrl("canvas.css")).then((response) => response.text()),
          fetch(assetUrl("app.js")).then((response) => response.text())
        ]);
        const frame = document.createElement("iframe");
        frame.title = "plugin smoke target";
        document.body.append(frame);
        const doc = frame.contentDocument;
        const win = frame.contentWindow;
        doc.open();
        doc.write("<!doctype html><html><head><meta charset=\"utf-8\"><title>Plugin Host Smoke</title></head><body></body></html>");
        doc.close();

        const style = doc.createElement("style");
        style.textContent = scopeCanvasCss(css);
        doc.head.append(style);

        const host = doc.createElement("div");
        host.className = "narrative-canvas-plugin-host";
        host.innerHTML = extractBodyHtml(html);
        doc.body.append(host);

        let ensuredProjectPath = "";
        let newProjectIndex = 0;
        win.__sampleEnsureOptions = null;
        win.__saveProjectCalls = [];
        win.__createdProjectPaths = [];
        win.__createdProjectStates = [];
        win.__createdProjectOptions = [];
        win.NarrativeCanvasHost = {
          root: host,
          loadProject: async () => null,
          saveProject: async (savedStateJson) => {
            win.__saveProjectCalls.push(savedStateJson);
            ensuredProjectPath = "Smoke.ncanvas";
            return ensuredProjectPath;
          },
          getAutoSaveIntervalMs: () => 1000,
          ensureProjectFile: async (_savedStateJson, options) => {
            win.__sampleEnsureOptions = options || null;
            ensuredProjectPath = options?.filenameOverride || "Sample-smoke.ncanvas";
            return ensuredProjectPath;
          },
          createProjectFile: async (savedStateJson, options = {}) => {
            newProjectIndex += 1;
            const title = options.filenameProjectTitle || "Untitled";
            ensuredProjectPath = `${title}-smoke-${newProjectIndex}.ncanvas`;
            win.__createdProjectPaths.push(ensuredProjectPath);
            win.__createdProjectStates.push(JSON.parse(savedStateJson));
            win.__createdProjectOptions.push(options);
            return ensuredProjectPath;
          },
          previewNewProjectFile: async (_savedStateJson, options = {}) => `${options.filenameProjectTitle || "Untitled"}-smoke-${newProjectIndex + 1}.ncanvas`,
          getProjectFile: () => ensuredProjectPath
        };

        const script = doc.createElement("script");
        script.textContent = appJs;
        doc.body.append(script);
        await win.NarrativeCanvasApp.init();
        await waitFor("plugin app ready", () => Boolean(doc.querySelector(".narrative-canvas-plugin-host .app-shell[data-theme]")));
        return { frame, win, doc };
      }

      async function runCoreChecks(label, target) {
        const { win, doc } = target;
        const root = doc.querySelector(".app-shell");
        assert(`${label}: app shell exists`, Boolean(root));
        assert(`${label}: no startup error`, !doc.querySelector(".startup-error"));
        assert(`${label}: export scale select exists`, Boolean(doc.querySelector("#exportImageScale")));
        assert(`${label}: theme toggle exists`, Boolean(doc.querySelector("#themeToggle")));
        assert(`${label}: project file status exists`, Boolean(doc.querySelector("#projectFileName")));
        const clearStorageButton = doc.querySelector("[data-action='clear-browser-storage']");
        if ("__saveProjectCalls" in win) {
          assert(`${label}: clear browser storage is hidden in plugin`, isElementHidden(win, clearStorageButton));
        } else {
          assert(`${label}: clear browser storage is available on web`, clearStorageButton && !isElementHidden(win, clearStorageButton));
        }
        if ("__sampleEnsureOptions" in win) {
          assert(`${label}: init does not create sample project`, win.__sampleEnsureOptions === null);
        }
        if (win.__sampleEnsureOptions) {
          assert(`${label}: sample project filename is Sample`, win.__sampleEnsureOptions.filenameOverride === "Sample.ncanvas");
        }
        const toolbar = doc.querySelector("#workspaceToolbar");
        assert(`${label}: canvas toolbar exists`, Boolean(toolbar));
        assert(`${label}: canvas toolbar starts visible`, !isElementHidden(win, toolbar));
        assert(`${label}: auto-layout buttons are not shown`, !doc.querySelector("[data-action='auto-layout']"));
        assert(`${label}: canvas HTML export button is not shown`, !doc.querySelector("#workspaceToolbar [data-action='export-html']"));
        const undoButton = doc.querySelector("#undoButton");
        const redoButton = doc.querySelector("#redoButton");
        assert(`${label}: history controls live in workspace header`, undoButton?.closest(".workspace-global-bar") && redoButton?.closest(".workspace-global-bar"));
        assert(`${label}: history controls are not floating over canvas`, !doc.querySelector(".canvas-frame #undoButton") && !doc.querySelector(".canvas-frame #redoButton"));
        assert(`${label}: image export controls are grouped`, Boolean(doc.querySelector(".export-image-controls .export-image-button + .export-image-scale-label")));
        const imageButtonRect = doc.querySelector(".export-image-button")?.getBoundingClientRect();
        const imageScaleRect = doc.querySelector(".export-image-controls .toolbar-select")?.getBoundingClientRect();
        assert(
          `${label}: image export button segments align`,
          imageButtonRect && imageScaleRect
            && Math.abs(imageButtonRect.top - imageScaleRect.top) <= 1
            && Math.abs(imageButtonRect.height - imageScaleRect.height) <= 1,
          `button=${imageButtonRect?.top.toFixed(1)}/${imageButtonRect?.height.toFixed(1)} scale=${imageScaleRect?.top.toFixed(1)}/${imageScaleRect?.height.toFixed(1)}`
        );
        const imageScaleStyle = win.getComputedStyle(doc.querySelector(".export-image-controls .toolbar-select"));
        assert(
          `${label}: image export select padding is balanced`,
          imageScaleStyle.paddingLeft === imageScaleStyle.paddingRight,
          `left=${imageScaleStyle.paddingLeft} right=${imageScaleStyle.paddingRight}`
        );

        const themeButton = doc.querySelector("#themeToggle");
        const themeMarker = win.getComputedStyle(themeButton, "::before");
        assert(`${label}: theme toggle has no marker`, themeMarker.content === "none" || themeMarker.display === "none");
        assertReadableLightThemeToggle(label, win, themeButton, "initial");
        const beforeTheme = root.getAttribute("data-theme");
        click(themeButton);
        await wait(80);
        assert(`${label}: theme toggles`, root.getAttribute("data-theme") !== beforeTheme);
        assertReadableLightThemeToggle(label, win, themeButton, "toggled");

        const scale = doc.querySelector("#exportImageScale");
        setControlValue(win, scale, "2");
        assert(`${label}: export scale can change`, scale.value === "2");
        click(doc.querySelector("[data-action='add-node'][data-type='Marker']"));
        await waitFor(`${label}: marker node added for auto-size check`, () => doc.querySelector(".node.selected .node-title")?.textContent === "Marker");
        const autoSizeNodeBefore = doc.querySelector(".node.selected") || doc.querySelector(".node[data-node-id]");
        const autoSizeWidthBefore = Number.parseFloat(autoSizeNodeBefore?.style.width || "0");
        const titleInput = doc.querySelector("[data-node-field='title']");
        setControlValue(win, titleInput, "A very long narrative node title that should expand the default node width");
        await waitFor(`${label}: long title expands default node width`, () => {
          const autoSizeNodeAfter = doc.querySelector(".node.selected") || doc.querySelector(".node[data-node-id]");
          return Number.parseFloat(autoSizeNodeAfter?.style.width || "0") > autoSizeWidthBefore + 20;
        });
        const clippedNode = doc.querySelector(".node.selected") || doc.querySelector(".node[data-node-id]");
        assert(`${label}: node clips shrunken content`, win.getComputedStyle(clippedNode).overflow === "hidden");
        assert(`${label}: node body text clips inside border`, win.getComputedStyle(clippedNode.querySelector(".node-text")).overflow === "hidden");
        for (let index = 0; index < 8; index += 1) {
          click(doc.querySelector("[data-action='zoom-out']"));
        }
        assert(`${label}: canvas can zoom out to 3 percent`, doc.querySelector("#zoomReadout")?.textContent === "3%");
        await wait(80);
        const canvasNodeBeforeFileSwitch = doc.querySelector(".node[data-node-id]");
        const canvasNodeCountBeforeFileSwitch = doc.querySelectorAll(".node[data-node-id]").length;

        click(doc.querySelector("[data-file-id='characters']"));
        await waitFor(`${label}: characters opens`, () => Boolean(doc.querySelector("[data-character-search]")));
        assert(`${label}: canvas toolbar hides on characters`, isElementHidden(win, toolbar));
        const characterSearch = doc.querySelector("[data-character-search]");
        assert(`${label}: character search lives in bottom status bar`, characterSearch?.closest(".status-bar") && !characterSearch.closest(".document-header"));
        assert(`${label}: character search is visible at bottom`, !isElementHidden(win, characterSearch));
        assert(`${label}: canvas query hides on characters`, isElementHidden(win, doc.querySelector("#queryInput")));
        const characterGrid = doc.querySelector(".character-grid");
        const characterGridStyle = win.getComputedStyle(characterGrid);
        assert(
          `${label}: character cards use masonry grid`,
          characterGridStyle.display === "grid" && doc.querySelector(".character-column") && Number.parseFloat(characterGridStyle.gap) >= 12,
          `display=${characterGridStyle.display} gap=${characterGridStyle.gap} columns=${doc.querySelectorAll(".character-column").length}`
        );
        const characterCard = doc.querySelector(".character-card");
        assert(`${label}: character cards do not overflow`, characterCard && characterCard.scrollWidth <= characterCard.clientWidth + 1, `scroll=${characterCard?.scrollWidth} client=${characterCard?.clientWidth}`);
        setControlValue(win, characterSearch, "mara");
        assert(`${label}: characters search accepts input`, characterSearch.value === "mara");
        assert(`${label}: character filter bar updates`, doc.querySelector("[data-character-filter-bar]")?.textContent.toLowerCase().includes("mara"));

        click(doc.querySelector("[data-file-id='events']"));
        await waitFor(`${label}: events opens`, () => Boolean(doc.querySelector("[data-event-search]")));
        assert(`${label}: canvas toolbar hides on events`, isElementHidden(win, toolbar));
        const eventSearch = doc.querySelector("[data-event-search]");
        assert(`${label}: event search lives in bottom status bar`, eventSearch?.closest(".status-bar") && !eventSearch.closest(".document-header"));
        assert(`${label}: event search is visible at bottom`, !isElementHidden(win, eventSearch));
        assert(`${label}: character search hides on events`, isElementHidden(win, characterSearch));
        assert(`${label}: sample event sheet shows custom columns`, doc.body.textContent.includes("Location") && doc.body.textContent.includes("Clue Status"));
        assert(`${label}: sample event sheet uses custom story event class`, doc.body.textContent.includes("Story Sequence"));
        assert(`${label}: sample event sheet shows hidden-column restore`, doc.body.textContent.includes("Status"));
        const eventFilterChip = doc.querySelector("[data-event-filter-bar] .filter-chip");
        const firstEventGroupHeader = doc.querySelector(".event-sheet-group-header");
        const filterRect = eventFilterChip?.getBoundingClientRect();
        const groupHeaderRect = firstEventGroupHeader?.getBoundingClientRect();
        assert(
          `${label}: event filter bar does not overlap first group heading`,
          filterRect && groupHeaderRect && filterRect.bottom + 2 <= groupHeaderRect.top,
          `filterBottom=${filterRect?.bottom.toFixed(1)} groupTop=${groupHeaderRect?.top.toFixed(1)}`
        );
        const firstEventSheetScroll = doc.querySelector(".event-sheet-scroll");
        assert(
          `${label}: event sheet scrolls horizontally instead of squeezing columns`,
          firstEventSheetScroll && firstEventSheetScroll.scrollWidth > firstEventSheetScroll.clientWidth + 1,
          `scroll=${firstEventSheetScroll?.scrollWidth} client=${firstEventSheetScroll?.clientWidth}`
        );
        firstEventSheetScroll.scrollLeft = Math.min(180, firstEventSheetScroll.scrollWidth - firstEventSheetScroll.clientWidth);
        await wait(40);
        const eventScrollLeftBeforeResize = firstEventSheetScroll.scrollLeft;
        const eventColumnResizeHandle = doc.querySelector("[data-event-column-resize='eventDescription']")
          || doc.querySelector("[data-event-column-resize]");
        const eventColumnResizeRect = eventColumnResizeHandle?.getBoundingClientRect();
        assert(`${label}: event column resize handle is available`, Boolean(eventColumnResizeHandle && eventColumnResizeRect));
        eventColumnResizeHandle.dispatchEvent(new win.PointerEvent("pointerdown", {
          bubbles: true,
          cancelable: true,
          pointerId: 41,
          button: 0,
          clientX: eventColumnResizeRect.right - 1,
          clientY: eventColumnResizeRect.top + eventColumnResizeRect.height / 2
        }));
        win.dispatchEvent(new win.PointerEvent("pointermove", {
          bubbles: true,
          cancelable: true,
          pointerId: 41,
          button: 0,
          clientX: eventColumnResizeRect.right + 36,
          clientY: eventColumnResizeRect.top + eventColumnResizeRect.height / 2
        }));
        win.dispatchEvent(new win.PointerEvent("pointerup", {
          bubbles: true,
          cancelable: true,
          pointerId: 41,
          button: 0,
          clientX: eventColumnResizeRect.right + 36,
          clientY: eventColumnResizeRect.top + eventColumnResizeRect.height / 2
        }));
        await wait(100);
        const eventScrollAfterResize = doc.querySelector(".event-sheet-scroll");
        assert(
          `${label}: event column resize preserves horizontal scroll`,
          eventScrollLeftBeforeResize > 0 && eventScrollAfterResize?.scrollLeft >= eventScrollLeftBeforeResize - 2,
          `before=${eventScrollLeftBeforeResize} after=${eventScrollAfterResize?.scrollLeft}`
        );
        click(doc.querySelector("[data-action='add-node'][data-type='Event']"));
        await waitFor(`${label}: add event frame returns to canvas`, () => root.getAttribute("data-active-file") === "adventure" && doc.querySelector(".node.selected"));
        click(doc.querySelector("[data-file-id='events']"));
        await waitFor(`${label}: added event frame appears in event sheet`, () => Boolean(doc.querySelector("[data-event-group-type='Event'] .event-node-link")));
        const addedEventGroup = doc.querySelector("[data-event-group-type='Event']");
        const addedEventScroll = addedEventGroup?.querySelector(".event-sheet-scroll");
        assert(
          `${label}: added event frame table keeps horizontal scroll`,
          addedEventScroll && addedEventScroll.scrollWidth > addedEventScroll.clientWidth + 1,
          `scroll=${addedEventScroll?.scrollWidth} client=${addedEventScroll?.clientWidth}`
        );
        const addedEventNodeCard = addedEventGroup?.querySelector(".event-node-link");
        const addedEventHiddenCell = addedEventGroup?.querySelector(".event-hidden-cell");
        const addedEventNodeRect = addedEventNodeCard?.getBoundingClientRect();
        const addedEventHiddenRect = addedEventHiddenCell?.getBoundingClientRect();
        assert(`${label}: added event frame node cell keeps readable width`, addedEventNodeRect && addedEventNodeRect.width >= 240, `width=${addedEventNodeRect?.width.toFixed(1)}`);
        assert(`${label}: added event frame hidden column keeps readable width`, addedEventHiddenRect && addedEventHiddenRect.width >= 200, `width=${addedEventHiddenRect?.width.toFixed(1)}`);
        setControlValue(win, eventSearch, "boarding");
        assert(`${label}: events search accepts input`, eventSearch.value === "boarding");
        assert(`${label}: event filter bar updates`, doc.querySelector("[data-event-filter-bar]")?.textContent.toLowerCase().includes("boarding"));

        click(doc.querySelector("[data-file-id='variables']"));
        await waitFor(`${label}: playbook opens`, () => Boolean(doc.querySelector("[data-variable-field='type']")));
        assert(`${label}: canvas toolbar hides on playbook`, isElementHidden(win, toolbar));
        assert(`${label}: history controls stay visible on playbook`, !isElementHidden(win, undoButton) && !isElementHidden(win, redoButton));
        const variableRowsBeforeUndo = doc.querySelectorAll(".variable-row:not(.variable-heading)").length;
        const hostCaptureBlocker = (event) => {
          if (event.target.closest("[data-action='add-variable']")) event.stopPropagation();
        };
        root.addEventListener("click", hostCaptureBlocker, { capture: true, once: true });
        click(doc.querySelector("[data-action='add-variable']"));
        await waitFor(`${label}: add variable is undoable from playbook despite host capture`, () => doc.querySelectorAll(".variable-row:not(.variable-heading)").length === variableRowsBeforeUndo + 1);
        assert(`${label}: undo button enables after playbook edit`, !undoButton.disabled);
        const playbookJsonEditor = doc.querySelector("textarea[data-project-field='variables']");
        assert(`${label}: playbook JSON editor is available after adding variable`, Boolean(playbookJsonEditor));
        (playbookJsonEditor || doc.activeElement || doc.body).dispatchEvent(new win.KeyboardEvent("keydown", { key: "z", ctrlKey: true, bubbles: true, cancelable: true }));
        await waitFor(`${label}: Ctrl+Z undoes playbook edit`, () => doc.querySelectorAll(".variable-row:not(.variable-heading)").length === variableRowsBeforeUndo);
        const variableTypes = [...doc.querySelectorAll("[data-variable-field='type']")].map((select) => select.value);
        ["string", "number", "boolean", "json"].forEach((type) => {
          assert(`${label}: sample includes ${type} variable`, variableTypes.includes(type));
        });
        const variableSelect = doc.querySelector("[data-variable-field='type']");
        variableSelect.focus();
        await waitFor(`${label}: select can focus`, () => doc.activeElement === variableSelect);

        click(doc.querySelector("[data-file-id='adventure']"));
        await waitFor(`${label}: canvas opens`, () => Boolean(doc.querySelector(".node[data-node-id]")));
        assert(`${label}: canvas toolbar returns on canvas`, !isElementHidden(win, toolbar));
        assert(`${label}: canvas query returns to bottom status bar`, doc.querySelector("#queryInput")?.closest(".status-bar") && !isElementHidden(win, doc.querySelector("#queryInput")));
        assert(`${label}: event search hides on canvas`, isElementHidden(win, eventSearch));
        assert(`${label}: node inspector hides position fields`, !doc.querySelector("[data-node-field='x']") && !doc.querySelector("[data-node-field='y']"));
        await win.NarrativeCanvasApp.save({ silent: true });
        const savedChoiceBranches = (readSavedProject(win)?.project?.links || [])
          .filter((link) => link.from === "n4")
          .sort((a, b) => a.choiceIndex - b.choiceIndex);
        assert(`${label}: sample choice branches keep explicit labels`, savedChoiceBranches.map((link) => link.label).join("|") === "Offer the watch|Hide the watch|Ask about Old Reyes");
        assert(`${label}: sample choice branches keep explicit indexes`, savedChoiceBranches.map((link) => link.choiceIndex).join("|") === "0|1|2");
        const canvasNodeAfterFileSwitch = doc.querySelector(".node[data-node-id]");
        const canvasNodeCountAfterFileSwitch = doc.querySelectorAll(".node[data-node-id]").length;
        assert(
          `${label}: canvas returns to the same first visible node after file tabs`,
          canvasNodeAfterFileSwitch?.dataset.nodeId === canvasNodeBeforeFileSwitch?.dataset.nodeId,
          `before=${canvasNodeBeforeFileSwitch?.dataset.nodeId} after=${canvasNodeAfterFileSwitch?.dataset.nodeId}`
        );
        assert(
          `${label}: canvas node layer stays populated after file tab return`,
          canvasNodeCountAfterFileSwitch > 0 && canvasNodeCountBeforeFileSwitch > 0,
          `before=${canvasNodeCountBeforeFileSwitch} after=${canvasNodeCountAfterFileSwitch}`
        );
        for (let index = 0; index < 12; index += 1) {
          click(doc.querySelector("[data-action='zoom-out']"));
        }
        assert(`${label}: canvas can reset to 3 percent before focus checks`, doc.querySelector("#zoomReadout")?.textContent === "3%");
        const singleFocusNode = doc.querySelector(".node[data-node-id='n13']") || doc.querySelector(".node[data-node-id]");
        click(singleFocusNode);
        await waitFor(`${label}: single-click node focuses at 100 percent`, () => doc.querySelector("#zoomReadout")?.textContent === "100%");
        assert(`${label}: single-click node does not open inline editor`, !doc.querySelector("[data-inline-node-field]"));
        await win.NarrativeCanvasApp.save({ silent: true });
        const savedLinkCountBeforePortCreate = readSavedProject(win)?.project?.links?.length || 0;
        const outputPort = doc.querySelector(".port.output[data-node-id='n13']") || doc.querySelector(".port.output[data-node-id]");
        const inputPort = [...doc.querySelectorAll(".port.input[data-node-id]")]
          .find((port) => port.dataset.nodeId !== outputPort?.dataset.nodeId);
        const outputPortRect = outputPort?.getBoundingClientRect();
        const outputNodeRect = doc.querySelector(`.node[data-node-id='${outputPort?.dataset.nodeId || ""}']`)?.getBoundingClientRect();
        const inputPortRect = inputPort?.getBoundingClientRect();
        const inputNodeRect = doc.querySelector(`.node[data-node-id='${inputPort?.dataset.nodeId || ""}']`)?.getBoundingClientRect();
        assert(
          `${label}: node output port sits on the node edge`,
          outputPortRect && outputNodeRect
            && outputPortRect.width > 0
            && outputPortRect.left <= outputNodeRect.right + 1
            && outputPortRect.right >= outputNodeRect.right - 1,
          `port=${outputPortRect?.left.toFixed(1)}..${outputPortRect?.right.toFixed(1)} node=${outputNodeRect?.left.toFixed(1)}..${outputNodeRect?.right.toFixed(1)}`
        );
        assert(
          `${label}: node input port sits on the node edge`,
          inputPortRect && inputNodeRect
            && inputPortRect.width > 0
            && inputPortRect.left <= inputNodeRect.left + 1
            && inputPortRect.right >= inputNodeRect.left - 1,
          `port=${inputPortRect?.left.toFixed(1)}..${inputPortRect?.right.toFixed(1)} node=${inputNodeRect?.left.toFixed(1)}..${inputNodeRect?.right.toFixed(1)}`
        );
        const clickableOutputInfo = findClickablePort(doc, "output");
        const clickableInputInfo = findClickablePort(doc, "input", clickableOutputInfo?.port?.dataset.nodeId || "");
        const linkOutputPort = clickableOutputInfo?.port || outputPort;
        const linkInputPort = clickableInputInfo?.port || inputPort;
        if (label === "web") {
          assert(`${label}: output port is the clickable hit target`, Boolean(clickableOutputInfo), `hit=${clickableOutputInfo?.hit?.className || clickableOutputInfo?.hit?.tagName || ""}`);
          assert(`${label}: input port is the clickable hit target`, Boolean(clickableInputInfo), `hit=${clickableInputInfo?.hit?.className || clickableInputInfo?.hit?.tagName || ""}`);
        }
        assert(`${label}: node input port is available for link creation`, Boolean(linkInputPort));
        click(linkOutputPort);
        await waitFor(`${label}: output port starts pending link`, () => Boolean(doc.querySelector(".link-path.pending")));
        click(linkInputPort);
        await wait(80);
        await win.NarrativeCanvasApp.save({ silent: true });
        const savedLinkCountAfterPortCreate = readSavedProject(win)?.project?.links?.length || 0;
        assert(
          `${label}: output-to-input click creates link`,
          savedLinkCountAfterPortCreate > savedLinkCountBeforePortCreate,
          `before=${savedLinkCountBeforePortCreate} after=${savedLinkCountAfterPortCreate}`
        );
        const resizedNodeId = linkOutputPort.dataset.nodeId;
        const resizedNode = doc.querySelector(`.node[data-node-id='${resizedNodeId}']`);
        const resizedNodeHandle = resizedNode?.querySelector(".node-resize-handle.right");
        const resizedViewport = doc.querySelector("#canvasViewport");
        const resizedNodeRectBefore = resizedNode?.getBoundingClientRect();
        resizedNodeHandle?.dispatchEvent(new win.PointerEvent("pointerdown", {
          bubbles: true,
          cancelable: true,
          pointerId: 34,
          button: 0,
          buttons: 1,
          clientX: resizedNodeRectBefore?.right || 0,
          clientY: resizedNodeRectBefore ? resizedNodeRectBefore.top + resizedNodeRectBefore.height / 2 : 0
        }));
        resizedViewport?.dispatchEvent(new win.PointerEvent("pointermove", {
          bubbles: true,
          cancelable: true,
          pointerId: 34,
          button: 0,
          buttons: 1,
          clientX: (resizedNodeRectBefore?.right || 0) + 80,
          clientY: resizedNodeRectBefore ? resizedNodeRectBefore.top + resizedNodeRectBefore.height / 2 : 0
        }));
        resizedViewport?.dispatchEvent(new win.PointerEvent("pointerup", {
          bubbles: true,
          cancelable: true,
          pointerId: 34,
          button: 0,
          buttons: 0,
          clientX: (resizedNodeRectBefore?.right || 0) + 80,
          clientY: resizedNodeRectBefore ? resizedNodeRectBefore.top + resizedNodeRectBefore.height / 2 : 0
        }));
        await wait(80);
        const resizedNodeAfter = doc.querySelector(`.node[data-node-id='${resizedNodeId}']`);
        const resizedNodeRectAfter = resizedNodeAfter?.getBoundingClientRect();
        const resizedOutputPort = doc.querySelector(`.port.output[data-node-id='${resizedNodeId}']`);
        const resizedOutputPortRect = resizedOutputPort?.getBoundingClientRect();
        assert(
          `${label}: resize grows the node width`,
          resizedNodeRectBefore && resizedNodeRectAfter && resizedNodeRectAfter.width > resizedNodeRectBefore.width + 40,
          `before=${resizedNodeRectBefore?.width.toFixed(1)} after=${resizedNodeRectAfter?.width.toFixed(1)}`
        );
        assert(
          `${label}: output port follows resized node edge`,
          resizedOutputPortRect && resizedNodeRectAfter
            && resizedOutputPortRect.left <= resizedNodeRectAfter.right + 1
            && resizedOutputPortRect.right >= resizedNodeRectAfter.right - 1,
          `port=${resizedOutputPortRect?.left.toFixed(1)}..${resizedOutputPortRect?.right.toFixed(1)} node=${resizedNodeRectAfter?.left.toFixed(1)}..${resizedNodeRectAfter?.right.toFixed(1)}`
        );
        for (let index = 0; index < 12; index += 1) {
          click(doc.querySelector("[data-action='zoom-out']"));
        }
        assert(`${label}: canvas can reset to 3 percent before double-click focus`, doc.querySelector("#zoomReadout")?.textContent === "3%");
        const inlineEditNode = doc.querySelector(".node[data-node-id='n1']") || doc.querySelector(".node[data-node-id]");
        inlineEditNode.dispatchEvent(new win.MouseEvent("dblclick", { bubbles: true, cancelable: true, view: win }));
        await waitFor(`${label}: double-click opens inline node editor`, () => Boolean(doc.querySelector("[data-inline-node-field]")));
        await waitFor(`${label}: double-click node focuses at 100 percent`, () => doc.querySelector("#zoomReadout")?.textContent === "100%");
        const inlineEditor = doc.querySelector("[data-inline-node-field]");
        inlineEditor.focus();
        const inlineEditNodeId = inlineEditor.dataset.nodeId;
        const inlineNodeTitle = doc.querySelector(`.node[data-node-id='${inlineEditNodeId}'] .node-title`)
          || doc.querySelector(`.node[data-node-id='${inlineEditNodeId}'] .node-body`)
          || doc.querySelector(`.node[data-node-id='${inlineEditNodeId}']`);
        inlineNodeTitle.dispatchEvent(new win.PointerEvent("pointerdown", { bubbles: true, cancelable: true, pointerId: 32, button: 0, clientX: 320, clientY: 240 }));
        inlineNodeTitle.dispatchEvent(new win.MouseEvent("click", { bubbles: true, cancelable: true, view: win }));
        inlineEditor.dispatchEvent(new win.FocusEvent("focusout", { bubbles: true, relatedTarget: null }));
        await wait(80);
        assert(`${label}: inline editor stays open when clicking same node`, Boolean(doc.querySelector(`[data-inline-node-field][data-node-id='${inlineEditNodeId}']`)));
        const inlineEditorAfterSameNodeClick = doc.querySelector(`[data-inline-node-field][data-node-id='${inlineEditNodeId}']`);
        doc.querySelector("#nodeLayer").dispatchEvent(new win.PointerEvent("pointerdown", { bubbles: true, cancelable: true, pointerId: 33, button: 0, clientX: 80, clientY: 80 }));
        inlineEditorAfterSameNodeClick?.dispatchEvent(new win.FocusEvent("focusout", { bubbles: true, relatedTarget: null }));
        await wait(80);
        assert(`${label}: inline editor closes when clicking outside node`, !doc.querySelector("[data-inline-node-field]"));
        click(doc.querySelector(".node[data-node-id='n1']"));
        await waitFor(`${label}: node body field is ready for mentions`, () => Boolean(doc.querySelector("[data-node-field='body']")));
        const mentionBodyField = doc.querySelector("[data-node-field='body']");
        setControlValue(win, mentionBodyField, "@");
        const mentionPopover = doc.querySelector("#mentionPopover");
        await waitFor(`${label}: @ opens character mention menu`, () => mentionPopover && !isElementHidden(win, mentionPopover) && mentionPopover.querySelector("[data-mention-index]"));
        const mentionOptionMarkup = mentionPopover.innerHTML;
        mentionPopover.innerHTML = Array.from({ length: 12 }, () => mentionOptionMarkup).join("");
        const mentionPopoverStyle = win.getComputedStyle(mentionPopover);
        assert(`${label}: mention menu uses vertical scrolling`, mentionPopoverStyle.overflowY === "auto" && mentionPopover.scrollHeight > mentionPopover.clientHeight + 1, `overflowY=${mentionPopoverStyle.overflowY} scroll=${mentionPopover.scrollHeight} client=${mentionPopover.clientHeight}`);
        assert(`${label}: mention menu does not show horizontal scrollbar`, mentionPopoverStyle.overflowX === "hidden" && mentionPopover.scrollWidth <= mentionPopover.clientWidth + 1, `overflowX=${mentionPopoverStyle.overflowX} scroll=${mentionPopover.scrollWidth} client=${mentionPopover.clientWidth}`);
        click(mentionPopover.querySelector("[data-mention-index='0']"));
        await wait(80);
        assert(`${label}: mention menu fully hides after selecting character`, isElementHidden(win, mentionPopover) && mentionPopover.innerHTML === "");
        assert(`${label}: mention insert writes selected character`, mentionBodyField.value.includes("@Mara"));
        const queryInput = doc.querySelector("#queryInput");
        setControlValue(win, queryInput, "boarding");
        assert(`${label}: global search accepts input`, queryInput.value === "boarding");

        const leftToggle = doc.querySelector("[data-sidebar-toggle='left']");
        click(leftToggle);
        await wait(80);
        assert(`${label}: left sidebar collapses`, root.getAttribute("data-sidebar-left") === "collapsed");
        const collapsedLeftToggleStyle = win.getComputedStyle(leftToggle);
        assert(
          `${label}: collapsed left toggle border is hidden`,
          hasHiddenBorder(collapsedLeftToggleStyle, "Left"),
          `${collapsedLeftToggleStyle.borderLeftWidth} ${collapsedLeftToggleStyle.borderLeftColor}; aria=${leftToggle.getAttribute("aria-expanded")}; matches=${leftToggle.matches(".sidebar-toggle-button[aria-expanded='false']")}; rule=${hasCollapsedToggleRule(doc)}`
        );

        const rightToggle = doc.querySelector("[data-sidebar-toggle='right']");
        click(rightToggle);
        await wait(80);
        assert(`${label}: right sidebar collapses`, root.getAttribute("data-sidebar-right") === "collapsed");
        const collapsedRightToggleStyle = win.getComputedStyle(rightToggle);
        assert(
          `${label}: collapsed right toggle border is hidden`,
          hasHiddenBorder(collapsedRightToggleStyle, "Right"),
          `${collapsedRightToggleStyle.borderRightWidth} ${collapsedRightToggleStyle.borderRightColor}; aria=${rightToggle.getAttribute("aria-expanded")}; matches=${rightToggle.matches(".sidebar-toggle-button[aria-expanded='false']")}; rule=${hasCollapsedToggleRule(doc)}`
        );
        assert(
          `${label}: collapsed sidebar toggles align vertically`,
          verticalCentersAligned(leftToggle, rightToggle),
          verticalCenterDetail(leftToggle, rightToggle)
        );
        click(leftToggle);
        await wait(80);
        assert(`${label}: left sidebar expands`, root.getAttribute("data-sidebar-left") === "expanded");
        click(rightToggle);
        await wait(80);
        assert(`${label}: right sidebar expands`, root.getAttribute("data-sidebar-right") === "expanded");

        const resizer = doc.querySelector("[data-sidebar-resizer='left']");
        const beforeWidth = Number.parseFloat(getComputedStyle(root).getPropertyValue("--sidebar-left-width"));
        resizer.dispatchEvent(new win.PointerEvent("pointerdown", { bubbles: true, pointerId: 31, clientX: beforeWidth, clientY: 40 }));
        win.dispatchEvent(new win.PointerEvent("pointermove", { bubbles: true, pointerId: 31, clientX: beforeWidth + 36, clientY: 40 }));
        win.dispatchEvent(new win.PointerEvent("pointerup", { bubbles: true, pointerId: 31, clientX: beforeWidth + 36, clientY: 40 }));
        await wait(100);
        const afterWidth = Number.parseFloat(getComputedStyle(root).getPropertyValue("--sidebar-left-width"));
        assert(`${label}: left sidebar resizes`, afterWidth > beforeWidth);

        const node = doc.querySelector(".node[data-node-id]");
        node.dispatchEvent(new win.MouseEvent("contextmenu", { bubbles: true, cancelable: true, clientX: 200, clientY: 160, view: win }));
        const menu = doc.querySelector("#nodeContextMenu");
        await waitFor(`${label}: context menu opens`, () => menu && !menu.hidden);
        const menuAction = menu.querySelector("[data-layer-action]");
        click(menuAction);
        await wait(80);
        assert(`${label}: context menu closes after action`, menu.hidden);

        const status = doc.querySelector(".status-bar").getBoundingClientRect();
        const workspace = doc.querySelector(".canvas-workspace").getBoundingClientRect();
        const search = doc.querySelector(".canvas-search-box").getBoundingClientRect();
        assert(`${label}: status bar stays inside workspace`, status.left >= workspace.left - 1 && status.right <= workspace.right + 1);
        assert(`${label}: bottom search starts in workspace`, search.left >= workspace.left - 1);

        if (win.__saveProjectCalls) {
          const beforeAutoSaveCalls = win.__saveProjectCalls.length;
          const projectTitleInput = doc.querySelector("[data-project-field='title']");
          setControlValue(win, projectTitleInput, `${projectTitleInput.value} Autosave`);
          assert(`${label}: save state changes to unsaved after edit`, doc.querySelector("#projectDirtyIndicator")?.dataset.saveState === "unsaved");
          await waitFor(`${label}: auto-save writes project`, () => win.__saveProjectCalls.length > beforeAutoSaveCalls, 3500);
          await waitFor(`${label}: auto-save returns to saved state`, () => doc.querySelector("#projectDirtyIndicator")?.dataset.saveState === "saved", 1000);
        }

        if (win.__createdProjectPaths) {
          const newButton = doc.querySelector("[data-action='new-project']");
          click(newButton);
          await waitFor(`${label}: new project dialog opens`, () => doc.querySelector("#confirmDialog")?.open);
          const newProjectNameInput = doc.querySelector("#newProjectNameInput");
          assert(`${label}: new project dialog has name input`, Boolean(newProjectNameInput));
          setControlValue(win, newProjectNameInput, "Smoke Draft");
          click(doc.querySelector("#confirmDialog [value='confirm']"));
          await waitFor(`${label}: new project vault file created`, () => win.__createdProjectPaths.length > 0);
          const createdPath = win.__createdProjectPaths[0];
          await waitFor(`${label}: project file card switches to new file`, () => doc.querySelector("#projectFileName")?.textContent === createdPath);
          assert(`${label}: new project create receives filename title`, win.__createdProjectOptions[0]?.filenameProjectTitle === "Smoke Draft");
          assert(`${label}: new project save JSON uses input title`, win.__createdProjectStates[0]?.project?.title === "Smoke Draft");
          assert(`${label}: new project starts without sample characters`, Array.isArray(win.__createdProjectStates[0]?.project?.characters) && win.__createdProjectStates[0].project.characters.length === 0);
          assert(
            `${label}: new project starts without default variables`,
            win.__createdProjectStates[0]?.project?.variables
              && !Array.isArray(win.__createdProjectStates[0].project.variables)
              && Object.keys(win.__createdProjectStates[0].project.variables).length === 0
          );
          assert(`${label}: new project title uses input`, doc.querySelector("#vaultProjectTitle")?.textContent === "Smoke Draft");
          assert(`${label}: new project save state is saved after file creation`, doc.querySelector("#projectDirtyIndicator")?.dataset.saveState === "saved");
          click(doc.querySelector("[data-file-id='characters']"));
          await waitFor(`${label}: new project characters page re-renders`, () => doc.querySelector("#charactersPanel")?.textContent.includes("No characters yet."));
          assert(`${label}: new project characters page drops sample names`, !doc.querySelector("#charactersPanel")?.textContent.includes("Mara"));
          await verifyCanDeleteAllCharactersAndVariables(label, win, doc);

          click(doc.querySelector("[data-file-id='events']"));
          await waitFor(`${label}: empty events page opens`, () => doc.querySelector("#eventsPanel")?.textContent.includes("No event frame nodes yet."));
          doc.querySelector("#eventsPanel [data-action='add-node'][data-type='Event']")?.click();
          await waitFor(`${label}: Add event frame works from empty events page`, () => doc.querySelector(".app-shell")?.getAttribute("data-active-file") === "adventure" && doc.body.textContent.includes("Event Frame"));

          click(doc.querySelector("[data-file-id='variables']"));
          await waitFor(`${label}: playbook page opens after empty project`, () => doc.querySelector("#variablesPanel")?.textContent.includes("No play rules yet."));
          doc.querySelector("#variablesPanel [data-action='add-variable']")?.click();
          await waitFor(`${label}: Add variable works from playbook`, () => doc.querySelector("#variablesPanel")?.textContent.includes("new_variable"));
          doc.querySelector("#variablesPanel [data-action='add-play-rule']")?.click();
          await waitFor(`${label}: Add play rule dialog opens`, () => doc.querySelector("#playRuleDialog")?.open);
          doc.querySelector("#playRuleDialog [data-action='create-play-rule'][data-playbook-rule-kind='text']")?.click();
          await waitFor(`${label}: Add play rule creates rule`, () => doc.querySelector("#variablesPanel")?.textContent.includes("1 Play rules") && !doc.querySelector("#variablesPanel")?.textContent.includes("No play rules yet."));
        } else if (clearStorageButton) {
          const previousConfirm = win.confirm;
          win.confirm = () => true;
          click(clearStorageButton);
          await waitFor(`${label}: clear browser storage confirm opens`, () => doc.querySelector("#genericConfirmDialog")?.open);
          click(doc.querySelector("#genericConfirmDialog [value='confirm']"));
          await waitFor(`${label}: clear browser storage saves blank project`, () => {
            const saved = readSavedProject(win);
            return saved?.project?.title === "Untitled"
              && saved.project.nodes?.length === 1
              && saved.project.characters?.length === 0
              && saved.project.variables
              && Object.keys(saved.project.variables).length === 0;
          });
          win.confirm = previousConfirm;
          assert(`${label}: clear browser storage selects blank entry`, doc.querySelector("#vaultProjectTitle")?.textContent === "Untitled");
          await verifyCanDeleteAllCharactersAndVariables(label, win, doc);
        }
      }

      async function run() {
        try {
          const web = await loadWebFrame();
          await runCoreChecks("web", web);

          const plugin = await loadPluginFrame();
          await runCoreChecks("plugin", plugin);
        } catch (error) {
          fail("smoke runner crashed", error && error.stack ? error.stack : String(error));
        } finally {
          report.finishedAt = new Date().toISOString();
          report.status = report.failures.length ? "fail" : "pass";
          document.body.setAttribute("data-smoke-status", report.status);
          document.querySelector("#smoke-report").textContent = JSON.stringify(report, null, 2);
        }
      }

      window.addEventListener("load", run, { once: true });
    </script>
  </body>
</html>
